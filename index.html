<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OsseoScan — Bone Cancer Classifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0c10;
      --panel:    #10141c;
      --border:   #1e2535;
      --accent:   #00e5ff;
      --danger:   #ff3b5c;
      --safe:     #00e676;
      --muted:    #4a5568;
      --text:     #cdd6f4;
      --text-dim: #6b7280;
      --radius:   12px;
      --glow-a:   0 0 18px rgba(0,229,255,.25);
      --glow-d:   0 0 18px rgba(255,59,92,.3);
      --glow-s:   0 0 18px rgba(0,230,118,.3);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 40px;
      /* subtle grid bg */
      background-image:
        linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── HEADER ─────────────────────────────── */
    header {
      width: 100%;
      max-width: 860px;
      padding: 36px 0 28px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 42px; height: 42px;
      border: 2px solid var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: var(--glow-a);
    }

    h1 {
      font-size: clamp(22px, 5vw, 34px);
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      padding-left: 56px;
    }

    /* ── MAIN CARD ───────────────────────────── */
    .card {
      width: 100%;
      max-width: 860px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* ── UPLOAD ZONE ─────────────────────────── */
    #upload-zone {
      padding: 40px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .drop-area {
      width: 100%;
      max-width: 480px;
      min-height: 200px;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color .2s, background .2s, box-shadow .2s;
      padding: 32px;
      text-align: center;
    }
    .drop-area:hover, .drop-area.drag-over {
      border-color: var(--accent);
      background: rgba(0,229,255,.04);
      box-shadow: var(--glow-a);
    }
    .drop-icon { font-size: 36px; opacity: .5; }
    .drop-label { font-size: 15px; color: var(--text-dim); }
    .drop-label strong { color: var(--accent); }
    .drop-meta { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
    input[type="file"] { display: none; }

    #preview-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #preview-img {
      max-width: 340px;
      max-height: 280px;
      object-fit: contain;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .change-btn {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      background: none; border: none; cursor: pointer;
      text-decoration: underline;
    }
    .change-btn:hover { color: var(--accent); }

    #analyze-btn {
      padding: 14px 42px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      letter-spacing: .5px;
      box-shadow: var(--glow-a);
      transition: opacity .2s, transform .15s;
    }
    #analyze-btn:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
    #analyze-btn:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; }

    /* ── LOADING ─────────────────────────────── */
    #loading {
      display: none;
      padding: 48px;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      border-bottom: 1px solid var(--border);
    }
    .scanner-wrap {
      position: relative;
      width: 80px; height: 80px;
    }
    .scanner-ring {
      width: 80px; height: 80px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .scan-line {
      position: absolute;
      top: 50%; left: 10%;
      width: 80%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scanLine 1.5s ease-in-out infinite;
      opacity: .7;
    }
    @keyframes scanLine {
      0%,100% { transform: translateY(-18px); opacity: 0; }
      50%      { transform: translateY(18px);  opacity: 1; }
    }

    .loading-label {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    #timer {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── RESULT ──────────────────────────────── */
    #result {
      display: none;
      padding: 36px 32px;
      flex-direction: column;
      gap: 28px;
      animation: fadeUp .4s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .result-top {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: flex-start;
    }

    .verdict-box {
      flex: 1;
      min-width: 220px;
      padding: 28px 24px;
      border-radius: var(--radius);
      border: 1px solid;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .verdict-box.cancer {
      border-color: var(--danger);
      background: rgba(255,59,92,.06);
      box-shadow: var(--glow-d);
    }
    .verdict-box.normal {
      border-color: var(--safe);
      background: rgba(0,230,118,.06);
      box-shadow: var(--glow-s);
    }

    .verdict-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .verdict-name {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .verdict-box.cancer .verdict-name { color: var(--danger); }
    .verdict-box.normal .verdict-name { color: var(--safe); }

    .verdict-icon { font-size: 28px; }

    .confidence-main {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--text-dim);
    }
    .confidence-main span {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    /* probability bars */
    .prob-panel {
      flex: 1;
      min-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
    }

    .prob-row { display: flex; flex-direction: column; gap: 6px; }

    .prob-header {
      display: flex;
      justify-content: space-between;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
    }
    .prob-header .name { color: var(--text-dim); }
    .prob-header .val  { color: var(--text); font-weight: 700; }

    .prob-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .prob-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.8s cubic-bezier(.4,0,.2,1);
    }
    .prob-fill.cancer { background: var(--danger); }
    .prob-fill.normal { background: var(--safe); }

    /* message */
    .result-message {
      padding: 18px 22px;
      border-radius: var(--radius);
      border-left: 3px solid;
      font-size: 14px;
      line-height: 1.7;
    }
    .result-message.cancer {
      border-color: var(--danger);
      background: rgba(255,59,92,.05);
      color: #fca5a5;
    }
    .result-message.normal {
      border-color: var(--safe);
      background: rgba(0,230,118,.05);
      color: #a7f3d0;
    }

    /* ── FOOTER ──────────────────────────────── */
    footer {
      width: 100%; max-width: 860px;
      padding: 20px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .footer-note {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .model-tag {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      border: 1px solid rgba(0,229,255,.25);
      padding: 4px 10px;
      border-radius: 99px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <div class="logo-row">
    <div class="logo-icon">🦴</div>
    <h1>Osseo<span>Scan</span></h1>
  </div>
  <p class="subtitle">Bone Cancer Detection &nbsp;·&nbsp; GhostAttentionCNN</p>
</header>

<div class="card">

  <!-- Upload -->
  <div id="upload-zone">
    <div class="drop-area" id="drop-area">
      <div class="drop-icon">🩻</div>
      <p class="drop-label"><strong>Click to upload</strong> or drag &amp; drop</p>
      <p class="drop-meta">PNG · JPG · JPEG — max 16 MB</p>
    </div>
    <input type="file" id="file-input" accept="image/*"/>

    <div id="preview-wrap">
      <img id="preview-img" alt="Preview"/>
      <button class="change-btn" id="change-btn">↩ choose different image</button>
    </div>

    <button id="analyze-btn" disabled>Run Analysis</button>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="scanner-wrap">
      <div class="scanner-ring"></div>
      <div class="scan-line"></div>
    </div>
    <p class="loading-label">Scanning…</p>
    <p id="timer">0.0 s</p>
  </div>

  <!-- Result -->
  <div id="result">
    <div class="result-top">
      <div class="verdict-box" id="verdict-box">
        <p class="verdict-label">Diagnosis</p>
        <div class="verdict-icon" id="verdict-icon"></div>
        <div class="verdict-name" id="verdict-name"></div>
        <div class="confidence-main">Confidence &nbsp;<span id="conf-pct"></span></div>
      </div>

      <div class="prob-panel">
        <div class="prob-row">
          <div class="prob-header">
            <span class="name">Cancer</span>
            <span class="val" id="prob-cancer-val">—</span>
          </div>
          <div class="prob-track"><div class="prob-fill cancer" id="prob-cancer-bar" style="width:0%"></div></div>
        </div>
        <div class="prob-row">
          <div class="prob-header">
            <span class="name">Normal</span>
            <span class="val" id="prob-normal-val">—</span>
          </div>
          <div class="prob-track"><div class="prob-fill normal" id="prob-normal-bar" style="width:0%"></div></div>
        </div>
      </div>
    </div>

    <div class="result-message" id="result-msg"></div>
  </div>

</div>

<footer>
  <p class="footer-note">⚠ For research use only — not a clinical diagnostic tool</p>
  <span class="model-tag">GhostAttentionCNN · 224×224</span>
</footer>

<script>
  const dropArea   = document.getElementById('drop-area');
  const fileInput  = document.getElementById('file-input');
  const previewWrap= document.getElementById('preview-wrap');
  const previewImg = document.getElementById('preview-img');
  const changeBtn  = document.getElementById('change-btn');
  const analyzeBtn = document.getElementById('analyze-btn');
  const loadingEl  = document.getElementById('loading');
  const resultEl   = document.getElementById('result');
  const timerEl    = document.getElementById('timer');

  let uploadedFile = null, timerID = null;

  function showPreview(file) {
    if (!file || !file.type.startsWith('image/')) { alert('Please upload a valid image.'); return; }
    if (file.size > 16 * 1024 * 1024)            { alert('File must be under 16 MB.');    return; }
    uploadedFile = file;
    previewImg.src = URL.createObjectURL(file);
    dropArea.style.display    = 'none';
    previewWrap.style.display = 'flex';
    analyzeBtn.disabled       = false;
    resultEl.style.display    = 'none';
  }

  dropArea.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { if (e.target.files[0]) showPreview(e.target.files[0]); });
  changeBtn.addEventListener('click', () => {
    uploadedFile = null;
    fileInput.value = '';
    dropArea.style.display    = '';
    previewWrap.style.display = 'none';
    analyzeBtn.disabled       = true;
    resultEl.style.display    = 'none';
  });

  dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
  dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
  dropArea.addEventListener('drop', e => {
    e.preventDefault(); dropArea.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) showPreview(e.dataTransfer.files[0]);
  });

  const API_URL = window.location.origin;

  analyzeBtn.addEventListener('click', async () => {
    if (!uploadedFile) return;

    analyzeBtn.disabled      = true;
    loadingEl.style.display  = 'flex';
    resultEl.style.display   = 'none';

    // start timer
    const t0 = Date.now();
    timerID = setInterval(() => {
      timerEl.textContent = ((Date.now() - t0) / 1000).toFixed(1) + ' s';
    }, 100);

    const form = new FormData();
    form.append('image', uploadedFile);

    try {
      const resp = await fetch(`${API_URL}/analyze`, { method: 'POST', body: form });
      const data = await resp.json();
      clearInterval(timerID);
      loadingEl.style.display = 'none';

      if (data.success) {
        showResult(data);
      } else {
        alert(data.error || 'Analysis failed.');
        analyzeBtn.disabled = false;
      }
    } catch (err) {
      clearInterval(timerID);
      loadingEl.style.display = 'none';
      alert('Cannot reach the server. Make sure Flask is running on port 5000.');
      analyzeBtn.disabled = false;
    }
  });

  function showResult(data) {
    const isCancer = data.prediction === 'Cancer';
    const cls      = isCancer ? 'cancer' : 'normal';

    // verdict box
    const box = document.getElementById('verdict-box');
    box.className = `verdict-box ${cls}`;
    document.getElementById('verdict-icon').textContent = isCancer ? '⚠️' : '✅';
    document.getElementById('verdict-name').textContent  = data.prediction;
    document.getElementById('conf-pct').textContent      = data.confidence + '%';

    // probability bars
    const probs = data.all_probs;  // { Cancer: xx, Normal: xx }
    const cProb = probs['Cancer'] ?? probs['cancer'] ?? 0;
    const nProb = probs['Normal'] ?? probs['normal'] ?? 0;

    document.getElementById('prob-cancer-val').textContent = cProb.toFixed(1) + '%';
    document.getElementById('prob-normal-val').textContent = nProb.toFixed(1) + '%';

    // animated bars (delay so display:flex is applied first)
    setTimeout(() => {
      document.getElementById('prob-cancer-bar').style.width = cProb + '%';
      document.getElementById('prob-normal-bar').style.width = nProb + '%';
    }, 50);

    // message
    const msg = document.getElementById('result-msg');
    msg.className = `result-message ${cls}`;
    msg.textContent = isCancer
      ? 'The model indicates signs consistent with bone cancer in this image. This result is for research purposes only — please consult a qualified radiologist or oncologist for clinical evaluation and diagnosis.'
      : 'The model found no strong indicators of bone cancer in this image. This is a computational assessment only and should not replace professional medical advice. Consult your physician for any health concerns.';

    resultEl.style.display = 'flex';
    analyzeBtn.disabled    = false;
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
</script>
</body>
</html>
